<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nyxia">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Nyxia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #1e1e1e;
      --accent:   #7c3aed;
      --accent2:  #4c1d95;
      --text:     #e8e8e8;
      --muted:    #666;
      --user-bg:  #1a1a2e;
      --nyxia-bg: #111118;
      --radius:   14px;
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .avatar-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent2);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .header-text span {
      font-size: 11px;
      color: var(--muted);
    }
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #status-dot.online  { background: #22c55e; }
    #status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.nyxia { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user  .bubble {
      background: var(--user-bg);
      border: 1px solid #2a2a4a;
      border-bottom-right-radius: 4px;
    }
    .msg.nyxia .bubble {
      background: var(--nyxia-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .sender {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }
    .msg.nyxia .sender { color: #6d28d9; }

    /* Typing indicator */
    .typing-bubble {
      background: var(--nyxia-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-5px); } }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      line-height: 1.4;
      -webkit-overflow-scrolling: touch;
    }
    #input:focus { border-color: #3b2070; }
    #input::placeholder { color: var(--muted); }

    #send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    #send:active  { transform: scale(0.92); }
    #send:disabled { background: #2a2a2a; cursor: default; }

    /* Empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      user-select: none;
      pointer-events: none;
    }
    #empty .glyph { font-size: 32px; opacity: 0.4; }
    #empty p { font-size: 13px; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 4px; }

    /* Mic button */
    #mic {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 17px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    #mic:active { transform: scale(0.92); }
    #mic.listening {
      background: #3b0a0a;
      border-color: #ef4444;
      color: #ef4444;
      animation: pulse 1s infinite;
    }
    #mic.hidden { display: none; }

    #input.recording {
      border-color: #3b1010;
      color: #aaa;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar-dot">✦</div>
    <div class="header-text">
      <h1>Nyxia</h1>
      <span>AI companion</span>
    </div>
    <div id="status-dot"></div>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="glyph">✦</div>
      <p>Say something.</p>
    </div>
  </div>

  <div id="input-bar">
    <button id="mic" title="Voice input">🎙</button>
    <textarea id="input" rows="1" placeholder="Message Nyxia..." autocomplete="off" autocorrect="on" spellcheck="true"></textarea>
    <button id="send">&#10148;</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const statusDot  = document.getElementById('status-dot');
  const emptyEl    = document.getElementById('empty');

  // Keep last 10 exchanges (20 messages) for context
  const history = [];
  const MAX_HISTORY = 20;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (not Shift+Enter)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function setStatus(state) {
    statusDot.className = state;
  }

  function addMessage(role, text) {
    if (emptyEl.parentNode) emptyEl.remove();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'you' : 'nyxia';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(sender);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg nyxia';
    wrap.id = 'typing';
    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'nyxia';
    const dot = document.createElement('div');
    dot.className = 'typing-bubble';
    dot.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(sender);
    wrap.appendChild(dot);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    setStatus('loading');

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, history: history.slice(-MAX_HISTORY) }),
      });

      removeTyping();

      if (!res.ok) {
        let errMsg = 'HTTP ' + res.status;
        try { const e = await res.json(); errMsg += ': ' + (e.error || JSON.stringify(e)); } catch(_) {}
        throw new Error(errMsg);
      }
      const data = await res.json();
      const reply = data.response || '...';

      addMessage('nyxia', reply);
      history.push({ role: 'assistant', content: reply });

      // Trim history
      while (history.length > MAX_HISTORY) history.shift();

      setStatus('online');
    } catch(e) {
      removeTyping();
      addMessage('nyxia', '✦ Something went wrong. Are you on the same network? ' + e.message);
      setStatus('');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Check if Nyxia is reachable on load
  async function checkHealth() {
    try {
      const r = await fetch('/health', { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.status === 'ok') setStatus('online');
    } catch(e) {
      setStatus('');
    }
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // SSE — receive desktop messages in real-time
  function connectSSE() {
    const es = new EventSource('/events');
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'message' && data.source === 'desktop') {
          if (data.role === 'user') {
            addMessage('user', '🖥 ' + data.content);
            history.push({ role: 'user', content: data.content });
          } else if (data.role === 'assistant') {
            addMessage('nyxia', data.content);
            history.push({ role: 'assistant', content: data.content });
            while (history.length > MAX_HISTORY) history.shift();
          }
        }
      } catch(_) {}
    };
    es.onerror = () => {
      es.close();
      // Reconnect after 5s if connection drops
      setTimeout(connectSSE, 5000);
    };
  }
  connectSSE();

  checkHealth();
  inputEl.focus();

  // ── Voice input (Web Speech API) ─────────────────────────────────────────
  const micBtn = document.getElementById('mic');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    micBtn.classList.add('hidden');
  } else {
    let recognition = null;
    let listening = false;

    function startListening() {
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add('listening');
        inputEl.classList.add('recording');
        inputEl.placeholder = 'Listening...';
      };

      recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t;
          else interim += t;
        }
        // Show interim in textarea while speaking
        inputEl.value = final || interim;
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';

        // Auto-send on final transcript
        if (final.trim()) {
          stopListening();
          setTimeout(() => send(), 120);
        }
      };

      recognition.onerror = (e) => {
        if (e.error !== 'no-speech') console.warn('[voice]', e.error);
        stopListening();
      };

      recognition.onend = () => stopListening();

      recognition.start();
    }

    function stopListening() {
      listening = false;
      micBtn.classList.remove('listening');
      inputEl.classList.remove('recording');
      inputEl.placeholder = 'Message Nyxia...';
      try { recognition && recognition.stop(); } catch(_) {}
      recognition = null;
    }

    micBtn.addEventListener('click', () => {
      if (listening) stopListening();
      else startListening();
    });
  }
</script>
</body>
</html>
